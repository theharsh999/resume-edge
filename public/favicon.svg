<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Background Document Shadow -->
  <rect x="9" y="8" width="46" height="50" rx="8" fill="#000000" opacity="0.2" />
  
  <!-- Background Document Body -->
  <rect x="8" y="6" width="46" height="50" rx="8" fill="url(#grad)" stroke="#818CF8" stroke-width="1.5" />
  
  <!-- Decorative Resume Lines -->
  <line x1="16" y1="16" x2="30" y2="16" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />
  <line x1="16" y1="22" x2="26" y2="22" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  
  <!-- RE Initials -->
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">RE</text>
  
  <!-- Accent Dot -->
  <circle cx="45" cy="41" r="3" fill="#38BDF8" />
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
  </defs>
</svg>